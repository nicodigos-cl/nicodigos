# Config-as-code for the support-ws service.
# Railway → Settings → Config as Code → /railway.ws.toml

[build]
builder = "RAILPACK"
# No Next/Prisma — Bun runs the TS gateway directly.
buildCommand = "true"

[deploy]
startCommand = "bun scripts/support-ws.ts"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
