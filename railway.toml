# https://docs.railway.com/config-as-code
# Railpack uses BuildKit secret mounts for service variables (unlike Dockerfile ARG).

[build]
builder = "RAILPACK"
# Private networking is unavailable during build — use the public DB URL for prerender.
# Real BETTER_AUTH_* / SENTRY_* come from Railway secrets (not logged / not baked into the image).
buildCommand = "bunx --bun prisma generate && DATABASE_URL=$DATABASE_PUBLIC_URL bun --bun run build"

[deploy]
# Private networking IS available here — migrate with the private DATABASE_URL.
preDeployCommand = ["bunx --bun prisma migrate deploy"]
startCommand = "bun --bun next start --hostname 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
